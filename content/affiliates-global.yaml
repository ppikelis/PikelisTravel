  # ─── Airport / city transfers ──────────────────────────────────────
  - slug: welcome-pickups
    label: Welcome Pickups (airport transfers)
    category: transport
    url: https://www.welcomepickups.com/
    program: welcomepickups
    linkText: Book a Welcome Pickups transfer
    notes: |
      Default global slug; for guide-specific city transfers (e.g. Rome
      Fiumicino → city centre at a fixed price) author a guide-specific
      entry like rome-fco-transfer with the city-scoped Welcome Pickups
      URL and reference it from the guide's affiliates.yaml.
