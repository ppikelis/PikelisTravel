# Global affiliate links — shared across guides.
#
# This file is the source of truth for affiliate links that appear in
# multiple guides (insurance, currency cards, eSIM, VPN, transport
# passes). Per-guide affiliates (specific hotels, tours, gear items)
# live in each guide folder's own affiliates.yaml.
#
# How this file is consumed:
#
#   The publish script (npm run publish -- <guide-folder>) reads this
#   file plus the guide's own affiliates.yaml. References listed in the
#   guide yaml's `references:` section pull entries from here. Each
#   used entry is upserted to the affiliateLink Sanity collection by
#   slug. The /go/<slug> redirector resolves at click time, applies
#   tracking from env vars on Vercel, and routes by visitor country.
#
# Authoring notes:
#
#   - URLs below are CURRENT homepages. Replace each with the affiliate
#     deeplink generated through the network's UI once each program is
#     approved. Until then, links render normally — no commission, but
#     no breakage.
#   - For meta-platform-wrapped programs (Awin / Impact / CJ / AvantLink),
#     paste the deeplink the platform gives you. It already carries
#     your tracking — don't strip query params.
#   - For simple-param programs (Booking, Amazon, Agoda, GYG, Kiwi),
#     paste the raw URL with no tracking. The renderer appends the
#     tracking ID from env vars.
#   - Slugs are the path under /go/. Once published they live in PDFs
#     and shared links — treat as immutable.

links:
  # ─── Money: cards & FX ─────────────────────────────────────────────
  - slug: revolut
    label: Revolut
    category: currency
    url: https://www.revolut.com/
    program: revolut
    linkText: Revolut card

  - slug: wise
