  # ─── Ground transport ──────────────────────────────────────────────
  - slug: trainline
    label: Trainline (UK / EU rail)
    category: transport
    url: https://www.thetrainline.com/
    program: trainline
    linkText: Book on Trainline

  - slug: flixbus
    label: Flixbus
